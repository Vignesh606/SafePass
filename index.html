<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafePass | Cyber Caspers</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-slate-800 rounded-2xl shadow-2xl p-8 border border-slate-700">
        <h1 class="text-3xl font-bold mb-2 text-blue-400">SafePass</h1>
        <p class="text-slate-400 mb-6 italic">"Your Security Mentor"</p>

        <div class="relative mb-6">
            <input type="password" id="pwd-input" 
                class="w-full bg-slate-700 border border-slate-600 rounded-lg py-3 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                placeholder="Enter password to analyze...">
        </div>

        <div class="mb-4">
            <div class="flex justify-between mb-2 text-sm">
                <span>Strength: <span id="strength-label" class="font-bold text-gray-500">None</span></span>
                <span>Entropy: <span id="entropy-value" class="text-blue-300">0</span> bits</span>
            </div>
            <div class="w-full bg-slate-700 rounded-full h-3">
                <div id="strength-bar" class="bg-gray-600 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <div class="space-y-4">
            <div class="p-4 bg-slate-900/50 rounded-lg border border-slate-700">
                <p class="text-xs uppercase text-slate-500 font-semibold mb-1">Time to Crack (RTX 40-series)</p>
                <p id="crack-time" class="text-xl font-mono text-emerald-400">Instant</p>
            </div>
            
            <div id="feedback-box" class="text-sm text-slate-300 bg-blue-900/20 p-3 rounded border border-blue-800/50 hidden">
                <strong>Mentor Advice:</strong> <span id="advice-text"></span>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
